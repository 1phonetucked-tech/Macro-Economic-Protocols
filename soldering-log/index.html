<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Soldering Log</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="../gallery.css?v=83" rel="stylesheet" type="text/css" media="all">
<style>
  /* Soldering Log: timestamped sessions plotted as a staggered progress line.
     Each .entry is positioned on the graph with CSS vars: --x/--y (desktop %)
     and optional --mx/--my (mobile %, <=800px; falls back to --x/--y). New
     entries go higher + further right (more progress); connect them with a
     <line> in the SVG .series group so the line staggers upward over time. */
  #log { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  #log .entry {
    position: absolute;
    left: var(--x);
    top: var(--y);
    transform: translate(-50%, -50%);
    pointer-events: auto;
    text-align: center;
  }
  #log .shots { display: flex; gap: 6px; justify-content: center; }
  #log .shots a { display: block; line-height: 0; }
  #log .shots img {
    display: block;
    width: 10vw; max-width: 150px; min-width: 88px;
    height: auto;
    background: #000000;
    cursor: pointer;
    transition: transform .2s cubic-bezier(.34, 1.56, .64, 1);
  }
  #log .entry:hover { z-index: 5; }
  #log .shots a:hover img { transform: scale(1.55); }
  #log .cap {
    margin-top: 8px;
    font-family: "Calibri", "Carlito", "Segoe UI", system-ui, -apple-system, sans-serif;
    color: #ffffff;
    font-size: 10px;
    line-height: 1.55;
    white-space: nowrap;
  }
  @media (max-width: 800px) {
    #log .entry { left: var(--mx, var(--x)); top: var(--my, var(--y)); }
    #log .shots img { width: 22vw; }
    #log .cap { font-size: 9px; }
  }
</style>
</head>
<body class="gallery-graph">
<svg class="graph-bg" width="100%" height="100%" preserveAspectRatio="none" aria-hidden="true">
  <defs>
    <marker id="axis-arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L8,5 L2,8" fill="none" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <g class="grid">
    <line x1="4%" y1="90.0%" x2="96%" y2="90.0%"/>
    <line x1="4%" y1="73.6%" x2="96%" y2="73.6%"/>
    <line x1="4%" y1="57.2%" x2="96%" y2="57.2%"/>
    <line x1="4%" y1="40.8%" x2="96%" y2="40.8%"/>
    <line x1="4%" y1="24.4%" x2="96%" y2="24.4%"/>
    <line x1="4%" y1="8.0%" x2="96%" y2="8.0%"/>
    <line class="vline" x1="6.0%" y1="8%" x2="6.0%" y2="90%"/>
    <line class="vline" x1="18.57%" y1="8%" x2="18.57%" y2="90%"/>
    <line class="vline" x1="31.14%" y1="8%" x2="31.14%" y2="90%"/>
    <line class="vline" x1="43.71%" y1="8%" x2="43.71%" y2="90%"/>
    <line class="vline" x1="56.29%" y1="8%" x2="56.29%" y2="90%"/>
    <line class="vline" x1="68.86%" y1="8%" x2="68.86%" y2="90%"/>
    <line class="vline" x1="81.43%" y1="8%" x2="81.43%" y2="90%"/>
    <line class="vline" x1="94.0%" y1="8%" x2="94.0%" y2="90%"/>
  </g>
  <line class="axis" x1="4%" y1="90%" x2="4%" y2="8%" marker-end="url(#axis-arrow)"/>
  <line class="axis" x1="4%" y1="90%" x2="96%" y2="90%" marker-end="url(#axis-arrow)"/>
  <g class="series">
    <!-- Staggered progress line. Add a segment per new entry, e.g.
         <line x1="18%" y1="74%" x2="34%" y2="58%"/> -->
  </g>
</svg>
<header>

</header>
<section id="log">
